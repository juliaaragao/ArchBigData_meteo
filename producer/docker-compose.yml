services:
  producer:
    build: .
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    container_name: producer
    ports:
      - '8000:8000'
    restart: "always"
    command: /bin/bash
    networks:
      - network1
    volumes:
      - ./app:/producer/app
    environment:
      - TZ=Europe/Paris

networks:
  network1:
    name: mynetwork
    external: true

