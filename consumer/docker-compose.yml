services:
  consumer:
    build: .
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    container_name: consumer
    restart: "always"
    networks:
      - network1
    volumes:
      - ./app:/consumer/app
    command: python -u /consumer/app/TP2_consumer.py

networks:
  network1:
    name: mynetwork
    external: true


